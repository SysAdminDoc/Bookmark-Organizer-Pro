name: CI

# Gates ordinary development: runs on every push and pull request, unlike
# build.yml which is release-focused (tags / manual dispatch only).
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff>=0.6
      - name: Lint (correctness rules)
        run: ruff check bookmark_organizer_pro tests

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
      - name: Run tests
        # The Tk-based UI is imported during collection, so a virtual display
        # is needed on headless CI runners.
        run: xvfb-run -a python -m pytest tests/ -ra --tb=short
      - name: Performance benchmarks
        if: matrix.python-version == '3.12'
        run: xvfb-run -a python benchmarks/bench_core.py --gate
