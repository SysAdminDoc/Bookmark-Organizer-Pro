<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmark Organizer Pro</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    body {
      width: 100%;
      height: 100vh;
      overflow-y: auto;
    }

    .panel {
      padding: 14px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border-soft);
      background: var(--panel);
      margin-bottom: 14px;
    }

    .tab-btn {
      flex: 1;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      padding: 8px 4px;
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .search-box {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .search-box input {
      flex: 1;
      padding: 7px 10px;
      font-size: 13px;
    }

    .search-box button {
      padding: 7px 10px;
      font-size: 13px;
    }

    .bookmark-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .bookmark-item {
      display: block;
      padding: 8px 10px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 4px;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .bookmark-item:hover {
      background: var(--panel);
      border-color: var(--border);
    }

    .bookmark-title {
      font-size: 13px;
      font-weight: 600;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bookmark-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
    }

    .bookmark-domain {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 10px;
      white-space: nowrap;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--muted);
      margin: 14px 0 6px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 24px 0;
    }

    .quick-add label {
      margin: 8px 0;
    }

    .quick-add input,
    .quick-add textarea {
      padding: 7px 10px;
      font-size: 13px;
    }

    .quick-add textarea {
      min-height: 50px;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--panel);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--error);
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: var(--success);
    }

    .count-badge {
      margin-left: auto;
      font-weight: 700;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="panel">
    <header>
      <div class="brand-row">
        <span class="brand-mark">B</span>
        <p class="eyebrow">Bookmark Organizer Pro</p>
      </div>
    </header>

    <div class="api-status" role="status" aria-live="polite">
      <span id="statusDot" class="status-dot" aria-hidden="true"></span>
      <span id="statusText">Connecting...</span>
      <span id="totalCount" class="count-badge"></span>
    </div>

    <div class="tabs" role="tablist" aria-label="Bookmark side panel sections">
      <button id="tab-btn-recent" class="tab-btn active" data-tab="recent" type="button" role="tab" aria-selected="true" aria-controls="tab-recent">Recent</button>
      <button id="tab-btn-search" class="tab-btn" data-tab="search" type="button" role="tab" aria-selected="false" aria-controls="tab-search" tabindex="-1">Search</button>
      <button id="tab-btn-add" class="tab-btn" data-tab="add" type="button" role="tab" aria-selected="false" aria-controls="tab-add" tabindex="-1">Add</button>
    </div>

    <div id="tab-recent" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-recent">
      <ul id="recentList" class="bookmark-list"></ul>
      <button id="loadMoreRecent" class="secondary" type="button" hidden>Load More</button>
      <div id="rediscoverSection" style="display:none">
        <p class="section-title">Rediscover</p>
        <ul id="rediscoverList" class="bookmark-list"></ul>
      </div>
    </div>

    <div id="tab-search" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-search" hidden>
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search bookmarks..." autocomplete="off" aria-label="Search bookmarks">
        <button id="searchBtn" type="button">Search</button>
      </div>
      <ul id="searchResults" class="bookmark-list"></ul>
    </div>

    <div id="tab-add" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-add" hidden>
      <div class="quick-add">
        <p id="addPageTitle" class="current-page"></p>
        <label>
          Category
          <input id="addCategory" type="text" autocomplete="off" list="categoryList">
          <datalist id="categoryList"></datalist>
        </label>
        <label>
          Tags
          <input id="addTags" type="text" placeholder="design, research, reading" autocomplete="off">
        </label>
        <label>
          Notes
          <textarea id="addNotes" maxlength="5000" placeholder="Add context for future rediscovery."></textarea>
        </label>
        <label class="checkbox-row">
          <input id="addReadLater" type="checkbox">
          <span>Read Later</span>
        </label>
        <div class="actions">
          <button id="addSaveBtn" type="button">Save Bookmark</button>
          <button id="importReadingListBtn" class="secondary" type="button" title="Import from Chrome Reading List">Reading List</button>
        </div>
        <p id="addStatus" class="status" role="status" aria-live="polite"></p>
      </div>
    </div>
  </main>
  <script src="shared.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
