<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Save to Bookmark Organizer Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <header>
      <div class="brand-row">
        <span class="brand-mark">B</span>
        <p class="eyebrow">Bookmark Organizer Pro</p>
      </div>
      <h1>Save Bookmark</h1>
      <p id="pageTitle" class="page-summary">Loading active tab...</p>
    </header>

    <label>
      Category
      <input id="category" type="text" autocomplete="off" list="categoryList">
      <datalist id="categoryList"></datalist>
    </label>

    <label>
      Tags
      <input id="tags" type="text" placeholder="design, research, reading" autocomplete="off">
    </label>

    <label>
      Notes
      <textarea id="notes" maxlength="5000" placeholder="Add context you will want when rediscovering this page."></textarea>
    </label>

    <label class="checkbox-row">
      <input id="readLater" type="checkbox">
      <span>Read Later</span>
    </label>

    <div class="actions">
      <button id="saveBookmark" type="button">Save Bookmark</button>
      <button id="openOptions" class="secondary" type="button">Options</button>
    </div>

    <section id="pendingPanel" class="pending-panel" role="status" aria-live="polite" hidden>
      <p id="pendingCount">0 pending quick saves</p>
      <div class="pending-actions">
        <button id="retryPending" type="button">Retry</button>
        <button id="clearPending" class="secondary" type="button">Clear</button>
      </div>
    </section>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
