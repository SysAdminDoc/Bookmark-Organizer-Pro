<!doctype html>
<html lang="en" dir="ltr" data-i18n-title="popupTitle">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Save to Bookmark Organizer Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <header>
      <div class="brand-row">
        <span class="brand-mark">B</span>
        <p class="eyebrow" data-i18n="extensionName">Bookmark Organizer Pro</p>
      </div>
      <h1 data-i18n="saveBookmark">Save Bookmark</h1>
      <p id="pageTitle" class="page-summary" data-i18n="loadingActiveTab">Loading active tab...</p>
    </header>

    <label>
      <span data-i18n="category">Category</span>
      <input id="category" type="text" autocomplete="off" list="categoryList">
      <datalist id="categoryList"></datalist>
    </label>

    <label>
      <span data-i18n="tags">Tags</span>
      <input id="tags" type="text" placeholder="design, research, reading" data-i18n-placeholder="tagsPlaceholder" autocomplete="off">
    </label>

    <label>
      <span data-i18n="notes">Notes</span>
      <textarea id="notes" maxlength="5000" placeholder="Add context you will want when rediscovering this page." data-i18n-placeholder="notesPlaceholder"></textarea>
    </label>

    <label class="checkbox-row">
      <input id="readLater" type="checkbox">
      <span data-i18n="readLater">Read Later</span>
    </label>

    <label class="checkbox-row">
      <input id="captureSnapshot" type="checkbox">
      <span data-i18n="preserveSignedInPage">Preserve this signed-in page</span>
    </label>
    <p class="field-hint" data-i18n="captureHint">Uploads a sanitized page copy (up to 4.5 MB). Bounded same-site styles, images, and fonts are embedded; scripts and forms are removed, omissions are reported, and cookies are never sent.</p>

    <div class="actions">
      <button id="saveBookmark" type="button" data-i18n="saveBookmark">Save Bookmark</button>
      <button id="openOptions" class="secondary" type="button" data-i18n="options">Options</button>
    </div>

    <section id="pendingPanel" class="pending-panel" role="status" aria-live="polite" hidden>
      <p id="pendingCount" data-i18n="zeroPendingSaves">0 pending quick saves</p>
      <ul id="pendingList" class="pending-list" aria-label="Pending save details"></ul>
      <div class="pending-actions">
        <button id="retryPending" type="button" data-i18n="retry">Retry</button>
        <button id="exportPending" class="secondary" type="button">Export JSON</button>
        <button id="clearPending" class="secondary" type="button" data-i18n="clear">Clear</button>
        <button id="restorePending" class="secondary" type="button" hidden>Undo Clear</button>
      </div>
    </section>

    <p id="status" class="status" role="status" aria-live="polite"></p>
  </main>
  <script src="i18n.js"></script>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
